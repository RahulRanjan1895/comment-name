      let nextPageToken = null;
      const COMMENTS_STORAGE_KEY = "flagBattleLastComments";

      /* store processed message ids */

      /* store comments */
      let lastComments = [];

      function normalizeAndTrimComments(comments) {
        return comments
          .filter((comment) => comment && comment.author && comment.message)
          .map((comment, index) => ({
            author: comment.author,
            message: comment.message,
            timestamp: Number(comment.timestamp) || Date.now() + index,
          }))
          .sort((a, b) => b.timestamp - a.timestamp)
          .slice(0,4);

        try {
          sessionStorage.setItem(
            COMMENTS_STORAGE_KEY,
            JSON.stringify(normalizeAndTrimComments(lastComments)),
          );
        } catch (err) {
          console.log("Could not save comments to sessionStorage:", err);
        }
      }

      function loadCommentsFromSession() {
        try {
          const storedComments = sessionStorage.getItem(COMMENTS_STORAGE_KEY);
          if (!storedComments) return false;

          const parsedComments = JSON.parse(storedComments);
          const normalizedComments = normalizeAndTrimComments(
            Array.isArray(parsedComments) ? parsedComments : [],
          );

          if (!normalizedComments.length) return false;
          lastComments = normalizedComments;
          return true;
        } catch (err) {
          console.log("Could not load comments from sessionStorage:", err);
          return false;
        }
      }

      function updateCommentsUI() {
        const container = document.getElementById("liveComments");
        container.innerHTML = "";

        lastComments = normalizeAndTrimComments(lastComments);
        console.log("Displaying comments:", lastComments);
        for (let i = 0; i < lastComments.length; i += 2) {
          const row = document.createElement("div");
          row.className = "comments-row";

          const pair = lastComments.slice(i, i + 2);
          pair.forEach((c) => {
            const div = document.createElement("div");
            div.className = "comment";

            // Display full message; CSS will truncate with ellipsis if it exceeds available width
            div.innerHTML = `<strong>${c.author}</strong>: <span>${c.message}</span>`;
            row.appendChild(div);
          });

          // Keep the second slot reserved so layout always stays 2-per-row.
          if (pair.length === 1) {
            const placeholder = document.createElement("div");
            placeholder.className = "comment";
            placeholder.innerHTML = "&nbsp;";
            row.appendChild(placeholder);
          }

          container.appendChild(row);
        }
      }

      /* dummy fallback comments */

      function addDummyComments() {
        lastComments = normalizeAndTrimComments([
          {
            author: "Rohit",
            message: "Hello everyone!",
            timestamp: Date.now() - 4000,
          },
          {
            author: "Anita",
            message: "Nice stream 👍",
            timestamp: Date.now() - 3000,
          },
          {
            author: "Sam",
            message: "United States",
            timestamp: Date.now() - 2000,
          },
          { author: "Priya", message: "India", timestamp: Date.now() - 1000 },
        ]);

        saveCommentsToSession();
        updateCommentsUI();
      }

      async function fetchLiveComments() {
        try {
          let url = `https://www.googleapis.com/youtube/v3/liveChat/messages?liveChatId=${LIVE_CHAT_ID}&part=snippet,authorDetails,id&key=${API_KEY}`;

          if (nextPageToken) {
            url += `&pageToken=${nextPageToken}`;
          }

          const response = await fetch(url);
          const data = await response.json();

          if (!response.ok || !data.items) {
            console.log("API failed, using stored comments or dummy comments");
            if (!loadCommentsFromSession()) {
              addDummyComments();
            } else {
              updateCommentsUI();
            }
            return;
          }

          data.items.forEach((item, index) => {
            const id = item.id;

            if (processedMessages.has(id)) return;
            processedMessages.add(id);

            const author = item.authorDetails.displayName;
            const message = item.snippet.displayMessage;

            lastComments.push({
              author: author,
              message: message,
              timestamp: Date.now() + index,
            });
            console.log("New comment:", author, message);
          });

          lastComments = normalizeAndTrimComments(lastComments);
          saveCommentsToSession();
          updateCommentsUI();
          nextPageToken = data.nextPageToken;
        } catch (err) {
          console.log("Error fetching chat:", err);
          if (!loadCommentsFromSession()) {
            addDummyComments();
          } else {
            updateCommentsUI();
          }
        }
      }

      /* fetch every 25 seconds */
      setInterval(fetchLiveComments, 300000);

      // Clear storage on each reload
      sessionStorage.removeItem(COMMENTS_STORAGE_KEY);

      // Always start with dummy comments
      addDummyComments();

      // Trigger one real fetch immediately as well.
      fetchLiveComments();

        tv: "Tuvalu",
        ug: "Uganda",
        ua: "Ukraine",
        ae: "United Arab Emirates",
        gb: "United Kingdom",
        us: "United States",
        uy: "Uruguay",
        uz: "Uzbekistan",
        vu: "Vanuatu",
        va: "Vatican City",
        ve: "Venezuela",
        vn: "Vietnam",
        ye: "Yemen",
        zm: "Zambia",
        zw: "Zimbabwe",
      };

      class Flag {
        constructor(code) {
          this.code = code;

          this.img = new Image();
          this.img.src =
            "https://flagcdn.com/w40/" + code.toLowerCase() + ".png";

          this.x = window.centerX + (Math.random() * 100 - 50);
          this.y = window.centerY + (Math.random() * 100 - 50);
          // Keep spawn speed moderate so flags remain controllable.
          this.vx = (Math.random() - 0.5) * 2.2;
          this.vy = (Math.random() - 0.5) * 2.2;

          this.dead = false;
        }

        update() {
          this.x += this.vx;
          this.y += this.vy;

          // Keep lone flags moving at a minimum cruising speed.
          // Increase pace in endgame so rounds close faster.
          const aliveCount = Array.isArray(flags) ? flags.length : 999;
          const minCruiseSpeed =
            aliveCount <= 3 ? 2.4 : aliveCount <= 6 ? 2.4 : 1.3;
          const maxCruiseSpeed =
            aliveCount <= 3 ? 4.8 : aliveCount <= 6 ? 5.2 : 3.6;
          const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
          if (currentSpeed > 0 && currentSpeed < minCruiseSpeed) {
            this.vx = (this.vx / currentSpeed) * minCruiseSpeed;
            this.vy = (this.vy / currentSpeed) * minCruiseSpeed;
          }
          if (currentSpeed > maxCruiseSpeed) {
            this.vx = (this.vx / currentSpeed) * maxCruiseSpeed;
            this.vy = (this.vy / currentSpeed) * maxCruiseSpeed;
          }

          let dx = this.x - window.centerX;
          let dy = this.y - window.centerY;

          let dist = Math.sqrt(dx * dx + dy * dy);

          // Allow a small margin so flags near the boundary can enter the gap reliably
          if (dist > window.radius - 6) {
            let angle = Math.atan2(dy, dx);

            let gapStart = rotation;
            let gapEnd = rotation + 0.8;

            let normalizedAngle = angle;
            let normalizedStart = gapStart % (Math.PI * 2);
            let normalizedEnd = gapEnd % (Math.PI * 2);

            if (normalizedAngle < 0) normalizedAngle += Math.PI * 2;
            if (normalizedStart < 0) normalizedStart += Math.PI * 2;
            if (normalizedEnd < 0) normalizedEnd += Math.PI * 2;

            let hitGap = false;

            if (normalizedStart < normalizedEnd) {
              hitGap =
                normalizedAngle > normalizedStart &&
                normalizedAngle < normalizedEnd;
            } else {
              hitGap =
                normalizedAngle > normalizedStart ||
                normalizedAngle < normalizedEnd;
            }

            if (hitGap) {
              // Flag hit the gap: mark as dead (unless it's the secret winner)
              if (SECRET_WINNER && this.code === SECRET_WINNER) {
                // Secret winner cannot be eliminated - teleport to a random safe spot instead
                const teleportAngle = Math.random() * Math.PI * 2;
                const teleportRadius = Math.random() * (window.radius * 0.7);
                this.x =
                  window.centerX + Math.cos(teleportAngle) * teleportRadius;
                this.y =
                  window.centerY + Math.sin(teleportAngle) * teleportRadius;
                this.vx = (Math.random() - 0.5) * 2.2;
                this.vy = (Math.random() - 0.5) * 2.2;
              } else {
                this.dead = true;
              }
            } else {
              // Smooth bounce with continuous path
              let normalizeLen = Math.sqrt(dx * dx + dy * dy);

              if (normalizeLen > 0) {
                // Reverse velocity with adaptive damping.
                // As the round nears the end, keep more bounce so finishes are quicker.
                const aliveCountEstimate = Math.max(1, flags.length);
                const endgameBounce = aliveCountEstimate <= 6;
                const finalDuelBounce = aliveCountEstimate <= 3;
                let randomFactor = finalDuelBounce
                  ? 1.05 + Math.random() * 0.15
                  : endgameBounce
                    ? 1.15 + Math.random() * 0.25
                    : 0.95 + Math.random() * 0.2;
                this.vx *= -randomFactor;
                this.vy *= -randomFactor;
                // play a small tone on bounce with the circle
                try {
                  playBounceSound();
                } catch (e) {}

                // Ensure minimum velocity to prevent slowdown
                let speedSq = this.vx * this.vx + this.vy * this.vy;
                if (speedSq < 2) {
                  let speed = Math.sqrt(speedSq);
                  if (speed > 0) {
                    this.vx = (this.vx / speed) * 1.8;
                    this.vy = (this.vy / speed) * 1.8;
                  }
                }

                // Add perturbation to change direction
                let perturbationX = (Math.random() - 0.5) * 1.0;
                let perturbationY = (Math.random() - 0.5) * 1.0;
                this.vx += perturbationX;
                this.vy += perturbationY;

                // Add tangential velocity to spread flags around circle
                let angle = Math.atan2(this.vy, this.vx);
                let tangentX =
                  Math.cos(angle + Math.PI / 2) * (Math.random() - 0.5) * 1.0;
                let tangentY =
                  Math.sin(angle + Math.PI / 2) * (Math.random() - 0.5) * 1.0;
                this.vx += tangentX;
                this.vy += tangentY;

                // Only push back toward center if very close to boundary
                let centerX = window.centerX - this.x;
                let centerY = window.centerY - this.y;
                let dist = Math.sqrt(centerX * centerX + centerY * centerY);
                if (dist > 0 && dist > window.radius * 0.9) {
                  // Weak nudge only at extreme distance
                  this.vx += (centerX / dist) * 0.2;
                  this.vy += (centerY / dist) * 0.2;
                }
              }
            }
          }

          // Hard clamp as a final safety so fast frames never leave flags outside the ring.
          const finalDx = this.x - window.centerX;
          const finalDy = this.y - window.centerY;
          const finalDist = Math.sqrt(finalDx * finalDx + finalDy * finalDy);
          const maxInsideRadius = window.radius - 3;
          if (finalDist > maxInsideRadius) {
            const a = Math.atan2(finalDy, finalDx);
            this.x = window.centerX + Math.cos(a) * maxInsideRadius;
            this.y = window.centerY + Math.sin(a) * maxInsideRadius;
            const aliveCountNow = Array.isArray(flags) ? flags.length : 999;
            const clampDamping =
              aliveCountNow <= 3 ? 0.98 : aliveCountNow <= 6 ? 0.92 : 0.85;
            this.vx *= clampDamping;
            this.vy *= clampDamping;
          }
        }

        draw() {
          // increase size of flags inside the circle
          // responsive flag size: smaller on mobile
          const isMobile = window.innerWidth <= 480;
          // make mobile flags smaller
          const flagW = isMobile ? 20 : 22;
          const flagH = isMobile ? 12 : 14;
          ctx.drawImage(
            this.img,
            this.x - flagW / 2,
            this.y - flagH / 2,
            flagW,
            flagH,
          );
        }
      }

      function createFlags() {
        flags = flagList.map((code) => new Flag(code));
      }

      function updateLeaderboard() {
        leaderboardEl.innerHTML = "";
        const fragment = document.createDocumentFragment();
        winners.forEach((winner, index) => {
          let entry = document.createElement("div");
          entry.className = "winner-entry";

          let serialNum = document.createElement("span");
          serialNum.textContent = String(winners.length - index) + ".";
          serialNum.style.fontWeight = "bold";
          serialNum.style.minWidth = "25px";

          let img = document.createElement("img");
          img.src = "https://flagcdn.com/w40/" + winner.toLowerCase() + ".png";

          let name = document.createElement("span");
          name.textContent = countryNames[winner];

          entry.appendChild(serialNum);
          entry.appendChild(img);
          entry.appendChild(name);
          fragment.appendChild(entry);
        });
        leaderboardEl.appendChild(fragment);
      }

      function resetWinners() {
        winners = [];
        updateLeaderboard();
      }

      function updateEliminatedFlags() {
        eliminatedFlagsEl.innerHTML = "";
        const fragment = document.createDocumentFragment();
        eliminatedFlags.forEach((code) => {
          let entry = document.createElement("div");
          entry.className = "eliminated-flag";

          let img = document.createElement("img");
          img.src = "https://flagcdn.com/w40/" + code.toLowerCase() + ".png";

          let name = document.createElement("span");
          name.textContent = countryNames[code];

          entry.appendChild(img);
          //   entry.appendChild(name);
          fragment.appendChild(entry);
        });
        eliminatedFlagsEl.appendChild(fragment);
      }

      function restartGame() {
        // reset any previous winner announcement and eliminated announcements
        window._winnerAnnounced = false;
        window.actualWinner = null;
        window._lastEliminatedAnnounced = null;

        // Reset secret winner each round
        SECRET_WINNER =
          secretWinnerList[Math.floor(Math.random() * secretWinnerList.length)];
        console.log(
          "New secret winner for round " + (round + 1) + ":",
          SECRET_WINNER,
        );

        gameActive = true;
        round++;
        roundEl.textContent = String(round);
        eliminatedFlags = [];
        updateEliminatedFlags();
        // Clear the eliminated flag image
        lastEliminatedFlagEl.src = "";
        lastEliminatedFlagEl.style.display = "none";
        lastEliminatedNameEl.textContent = "";
        // Ensure periodic eliminated announcements run for the new round
        if (!window._eliminatedAnnounceTimer) {
          window._lastEliminatedAnnounced =
            window._lastEliminatedAnnounced || null;
          window._eliminatedAnnounceTimer = setInterval(() => {
            try {
              if (eliminatedFlags && eliminatedFlags.length > 0) {
                const code = eliminatedFlags[0];
                if (code && code !== window._lastEliminatedAnnounced) {
                  announceEliminated(code);
                  window._lastEliminatedAnnounced = code;
                }
              }
            } catch (e) {}
          }, 4000);
        }

        createFlags();
      }

      function endGame(winnerCode) {
        gameActive = false;
        winners.unshift(winnerCode);
        if (winners.length > 2) {
          winners = winners.slice(0, 3);
        }
        updateLeaderboard();

        // Store actual winner; defer speaking until the winner is rendered
        window.actualWinner = winnerCode;

        // Stop any ongoing or queued speech so "is out" announcements
        // don't play after the final winner is shown.
        try {
          if (window.speechSynthesis) window.speechSynthesis.cancel();
        } catch (e) {}

        // Clear the periodic eliminated-announcement timer to prevent
        // further "is out" announcements after the game ends.
        try {
          if (window._eliminatedAnnounceTimer) {
            clearInterval(window._eliminatedAnnounceTimer);
            window._eliminatedAnnounceTimer = null;
          }
        } catch (e) {}

        if (restartTimeout) clearTimeout(restartTimeout);
        restartTimeout = setTimeout(() => {
          restartGame();
        }, 5000);
      }

      function drawRing() {
        // Draw main ring (white) with slimmer stroke
        ctx.lineWidth = 12;
        ctx.strokeStyle = "white";
        ctx.beginPath();
        ctx.arc(window.centerX, window.centerY, window.radius, 0, Math.PI * 2);
        ctx.stroke();

        // Draw the gap as a slightly thinner black arc so it blends with background
        ctx.lineWidth = 8;
        ctx.strokeStyle = "black";
        ctx.beginPath();
        ctx.arc(
          window.centerX,
          window.centerY,
          window.radius,
          rotation,
          rotation + 0.8,
        );
        ctx.stroke();
      }

      function drawFlags() {
        // First update positions so collisions use moved positions
        flags.forEach((f) => {
          if (!f.dead) f.update();
        });

        // Handle simple flag-flag collisions to create motion on contact
        let collisionThreshold = window.innerWidth <= 480 ? 16 : 24; // smaller on mobile
        for (let i = 0; i < flags.length; i++) {
          const A = flags[i];
          if (A.dead) continue;
          for (let j = i + 1; j < flags.length; j++) {
            const B = flags[j];
            if (B.dead) continue;

            // If either flag is very close to the outer boundary, skip collision
            // so it can pass through the gap reliably on small screens
            let dax = A.x - window.centerX;
            let day = A.y - window.centerY;
            let dbx = B.x - window.centerX;
            let dby = B.y - window.centerY;
            let distAedge = Math.sqrt(dax * dax + day * day);
            let distBedge = Math.sqrt(dbx * dbx + dby * dby);
            if (
              distAedge > window.radius * 0.9 ||
              distBedge > window.radius * 0.9
            )
              continue;

            let dx = A.x - B.x;
            let dy = A.y - B.y;
            let dist2 = dx * dx + dy * dy;
            let minDist = collisionThreshold;

            if (dist2 > 0 && dist2 < minDist * minDist) {
              let dist = Math.sqrt(dist2);
              let nx = dx / dist;
              let ny = dy / dist;

              // push them apart to resolve overlap
              let overlap = minDist - dist;
              let sepX = (nx * overlap) / 2;
              let sepY = (ny * overlap) / 2;
              A.x += sepX;
              A.y += sepY;
              B.x -= sepX;
              B.y -= sepY;

              // simple elastic impulse along normal
              let rvx = A.vx - B.vx;
              let rvy = A.vy - B.vy;
              let relVel = rvx * nx + rvy * ny;
              if (relVel < 0) {
                const aliveCount = flags.length;
                const isEndgame = aliveCount <= 6;
                const isFinalDuel = aliveCount <= 3;
                let restitution = isFinalDuel ? 0.94 : isEndgame ? 0.96 : 0.86;
                let impulseBoost = isFinalDuel ? 1.35 : isEndgame ? 1.55 : 1.22;
                let impulse =
                  ((-(1 + restitution) * relVel) / 2) * impulseBoost; // equal mass + boost
                A.vx += impulse * nx;
                A.vy += impulse * ny;
                B.vx -= impulse * nx;
                B.vy -= impulse * ny;

                // Keep a minimum speed after impact so collisions don't feel sluggish.
                let minSpeedAfterCollision = isFinalDuel
                  ? 2.6
                  : isEndgame
                    ? 3.2
                    : 2.1;
                let speedA = Math.sqrt(A.vx * A.vx + A.vy * A.vy);
                if (speedA < minSpeedAfterCollision && speedA > 0) {
                  A.vx = (A.vx / speedA) * minSpeedAfterCollision;
                  A.vy = (A.vy / speedA) * minSpeedAfterCollision;
                }
                let speedB = Math.sqrt(B.vx * B.vx + B.vy * B.vy);
                if (speedB < minSpeedAfterCollision && speedB > 0) {
                  B.vx = (B.vx / speedB) * minSpeedAfterCollision;
                  B.vy = (B.vy / speedB) * minSpeedAfterCollision;
                }
                // play collision tone
                try {
                  playCollisionSound();
                } catch (e) {}
              }

              // Clamp A inside the circle if collision pushed it outside
              let cdxA = A.x - window.centerX;
              let cdyA = A.y - window.centerY;
              let distA = Math.sqrt(cdxA * cdxA + cdyA * cdyA);
              if (distA > window.radius - 2) {
                const aliveCount = flags.length;
                const isEndgame = aliveCount <= 6;
                const isFinalDuel = aliveCount <= 3;
                let angA = Math.atan2(cdyA, cdxA);
                A.x = window.centerX + Math.cos(angA) * (window.radius - 2);
                A.y = window.centerY + Math.sin(angA) * (window.radius - 2);
                // reflect and damp velocity
                const reboundA = isFinalDuel
                  ? -1.02
                  : isEndgame
                    ? -1.05
                    : -0.95;
                A.vx *= reboundA;
                A.vy *= reboundA;
                // small inward nudge
                const inwardNudgeA = isFinalDuel ? 0.7 : isEndgame ? 1.0 : 0.75;
                A.vx += -Math.cos(angA) * inwardNudgeA;
                A.vy += -Math.sin(angA) * inwardNudgeA;
              }

              // Clamp B inside the circle if collision pushed it outside
              let cdxB = B.x - window.centerX;
              let cdyB = B.y - window.centerY;
              let distB = Math.sqrt(cdxB * cdxB + cdyB * cdyB);
              if (distB > window.radius - 2) {
                const aliveCount = flags.length;
                const isEndgame = aliveCount <= 6;
                const isFinalDuel = aliveCount <= 3;
                let angB = Math.atan2(cdyB, cdxB);
                B.x = window.centerX + Math.cos(angB) * (window.radius - 2);
                B.y = window.centerY + Math.sin(angB) * (window.radius - 2);
                const reboundB = isFinalDuel
                  ? -1.02
                  : isEndgame
                    ? -1.05
                    : -0.95;
                B.vx *= reboundB;
                B.vy *= reboundB;
                const inwardNudgeB = isFinalDuel ? 0.7 : isEndgame ? 1.0 : 0.75;
                B.vx += -Math.cos(angB) * inwardNudgeB;
                B.vy += -Math.sin(angB) * inwardNudgeB;
              }
            }
          }
        }

        // Draw flags after collision adjustments
        flags.forEach((f) => {
          if (!f.dead) {
            f.draw();
          }
        });

        let aliveFlags = [];
        let hadNewElimination = false;
        let latestEliminatedCode = null;
        for (let i = 0; i < flags.length; i++) {
          const f = flags[i];
          if (f.dead) {
            if (!eliminatedFlags.includes(f.code)) {
              eliminatedFlags.unshift(f.code);
              hadNewElimination = true;
              latestEliminatedCode = f.code;
            }
          } else {
            aliveFlags.push(f);
          }
        }

        if (hadNewElimination) {
          updateEliminatedFlags();
          lastEliminatedFlagEl.src =
            "https://flagcdn.com/w40/" +
            latestEliminatedCode.toLowerCase() +
            ".png";
          lastEliminatedFlagEl.style.display = "block";
          lastEliminatedNameEl.textContent =
            countryNames[latestEliminatedCode] || latestEliminatedCode;
        }

        flags = aliveFlags;

        aliveEl.textContent = String(flags.length);

        if (gameActive && flags.length === 1) {
          endGame(flags[0].code);
        }

        if (!gameActive && flags.length === 1) {
          // Draw semi-transparent background in center circle area
          ctx.fillStyle = "rgba(0,0,0,0.6)";
          ctx.beginPath();
          ctx.arc(
            window.centerX,
            window.centerY,
            window.radius * 0.92,
            0,
            Math.PI * 2,
          );
          ctx.fill();

          ctx.fillStyle = "white";
          ctx.textAlign = "center";

          ctx.drawImage(
            flags[0].img,
            window.centerX - 25,
            window.centerY - 55,
            50,
            35,
          );

          ctx.font = "bold 20px Arial";
          ctx.fillText(
            countryNames[flags[0].code] + " WINS 🎉",
            window.centerX,
            window.centerY + 30,
          );

          // Speak the actual winner exactly when displayed (only once)
          if (!window._winnerAnnounced) {
            try {
              speakWinner(window.actualWinner || flags[0].code);
            } catch (e) {}
            window._winnerAnnounced = true;
          }
        }
      }

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        rotation += rotationSpeed;

        drawRing();
        drawFlags();

        requestAnimationFrame(animate);
      }

      function buildFlagGrid() {
        const grid = document.getElementById("flagsGrid");

        flagList.forEach((code) => {
          let div = document.createElement("div");

          div.className = "flagBtn";

          let img = document.createElement("img");

          img.src = "https://flagcdn.com/w40/" + code.toLowerCase() + ".png";

          div.appendChild(img);

          grid.appendChild(div);
        });
      }

      createFlags();
      // Start periodic eliminated announcements (every 10s)
      if (!window._eliminatedAnnounceTimer) {
        window._lastEliminatedAnnounced =
          window._lastEliminatedAnnounced || null;
        window._eliminatedAnnounceTimer = setInterval(() => {
          try {
            // Announce the most recently eliminated flag (index 0 because we use unshift)
            if (eliminatedFlags && eliminatedFlags.length > 0) {
              const code = eliminatedFlags[0];
              if (code && code !== window._lastEliminatedAnnounced) {
                announceEliminated(code);
                window._lastEliminatedAnnounced = code;
              }
            }
          } catch (e) {}
        }, 4000); // 10 seconds
      }
      buildFlagGrid();
      updateLeaderboard();
      updateEliminatedFlags();
      animate();
    </script>
